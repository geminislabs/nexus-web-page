<!doctype html>
<html lang="es" class="h-full scroll-smooth antialiased">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="color-scheme" content="dark light" />
	<meta name="theme-color" data-nexus-dynamic content="#020617" />
	<meta name="application-name" content="NEXUS" />
	<meta name="format-detection" content="telephone=no" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@300;400;500;600;700;800;900&display=swap"
		rel="stylesheet" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover"
	class="min-h-full bg-slate-50 text-slate-900 [color-scheme:dark_light] dark:bg-slate-950 dark:text-slate-100">
	<div class="contents">%sveltekit.body%</div>
</body>

</html>
