<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fondo Planeta Rosa CSS</title>
		<style>
			/* --- Configuración Base --- */
			body,
			html {
				height: 100%;
				margin: 0;
				padding: 0;
				overflow: hidden;
				background-color: #05000a;
				font-family: sans-serif;
				color: white;
			}

			/* --- Capa 1: El Cielo Base y las Estrellas --- */
			.bg-stars {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: -2;
				background: linear-gradient(to bottom, #020005 0%, #1a0033 100%);
			}

			.bg-stars::after {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 1px;
				height: 1px;
				background: transparent;
				box-shadow:
					10vw 15vh 1px rgba(255, 255, 255, 0.8),
					30vw 40vh 1px rgba(255, 255, 255, 0.6),
					50vw 10vh 2px rgba(255, 200, 255, 0.9),
					70vw 30vh 1px rgba(255, 255, 255, 0.7),
					90vw 55vh 1px rgba(255, 255, 255, 0.8),
					20vw 80vh 1px rgba(255, 255, 255, 0.5),
					60vw 75vh 2px rgba(200, 220, 255, 0.8),
					85vw 90vh 1px rgba(255, 255, 255, 0.6),
					5vw 60vh 1px rgba(255, 255, 255, 0.7),
					40vw 20vh 0px rgba(255, 255, 255, 0.9);
				opacity: 0.7;
			}

			/* --- Capa 2: Horizonte del Planeta --- */
			.bg-planet-horizon {
				position: absolute;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 60%;
				z-index: -1;
				pointer-events: none;
				background: radial-gradient(
					150% 100% at 50% 100%,
					rgba(255, 50, 220, 0.9) 0%,
					rgba(180, 30, 200, 0.6) 15%,
					rgba(100, 0, 150, 0.2) 40%,
					transparent 70%
				);
				filter: blur(2px);
			}

			/* --- Contenido Ejemplo --- */
			.content {
				position: relative;
				z-index: 1;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				text-align: center;
			}

			h1 {
				font-size: 3rem;
				text-shadow: 0 0 10px rgba(255, 50, 220, 0.5);
			}
		</style>
	</head>
	<body>
		<div class="bg-stars"></div>

		<div class="bg-planet-horizon"></div>

		<main class="content">
			<h1>Welcome to Nixon</h1>
		</main>
	</body>
</html>
